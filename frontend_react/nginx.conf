server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index welcome.html;

    # Serve static assets with correct MIME types
    location ~* \.(jsx|js)$ {
        add_header Content-Type application/javascript;
        try_files $uri =404;
    }

    location ~* \.css$ {
        add_header Content-Type text/css;
        try_files $uri =404;
    }

    # Default: serve files as-is; fall back to welcome.html
    location / {
        try_files $uri $uri/ /welcome.html;
    }

    # Proxy REST API calls to FastAPI backend
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        # Required for SSE (Server-Sent Events)
        proxy_buffering    off;
        proxy_cache        off;
    }

    # WebSocket proxy for live transcription
    location /api/ws/ {
        rewrite ^/api/ws/(.*)$ /ws/$1 break;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Health probe used by Docker
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Don't log health checks
    location = /favicon.ico { log_not_found off; access_log off; }
}
