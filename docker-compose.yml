version: "3.9"
# Medion KIS — local development stack
# Equivalent to docker-compose.kis.yml. Use `make up` for convenience.

services:
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: kis-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-Medion!KIS2026}
      - plugins.security.disabled=false
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: >
        curl -sk -u admin:${OPENSEARCH_ADMIN_PASSWORD:-Medion!KIS2026}
        https://localhost:9200/_cluster/health | grep -qv '"status":"red"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kis-backend
    ports:
      - "8000:8000"
    environment:
      - VECTOR_STORE=${VECTOR_STORE:-opensearch}
      - OPENSEARCH_URL=https://opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-Medion!KIS2026}
      - OPENSEARCH_INDEX=${OPENSEARCH_INDEX:-viaticum-transcripts}
      - STT_PROVIDER=${STT_PROVIDER:-stub}
      - PARAKEET_URL=http://stt_server:8001
      - PIONEER_API_KEY=${PIONEER_API_KEY:-}
      - PIONEER_NER_MODEL_ID=${PIONEER_NER_MODEL_ID:-}
      - PIONEER_SOAP_MODEL_ID=${PIONEER_SOAP_MODEL_ID:-}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
    volumes:
      - ./data:/app/data
      - ./backend/logs:/app/backend/logs
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  stt_server:
    build:
      context: stt_server
      dockerfile: Dockerfile
    container_name: kis-stt
    ports:
      - "8001:8001"
    environment:
      - STT_STUB=true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend_react:
    build:
      context: .
      dockerfile: Dockerfile.frontend_react
    container_name: kis-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  opensearch-data:

networks:
  default:
    name: kis-net
