version: "3.9"

# Medion KIS — static React frontend + FastAPI backend + OpenSearch vector DB
# Usage:  make up   /   docker compose -f docker-compose.kis.yml up -d

services:

  # ─── Vector database (OpenSearch) ────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: kis-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-Medion!KIS2026}
      - plugins.security.disabled=false
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: >
        curl -sk -u admin:${OPENSEARCH_ADMIN_PASSWORD:-Medion!KIS2026}
        https://localhost:9200/_cluster/health | grep -qv '"status":"red"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Optional: OpenSearch Dashboards — comment out in production
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: kis-opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-Medion!KIS2026}
    depends_on:
      opensearch:
        condition: service_healthy
    profiles:
      - debug   # only starts with: make up-debug

  # ─── PostgreSQL (patient records + chat history) ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kis-postgres
    environment:
      - POSTGRES_DB=kisdb
      - POSTGRES_USER=kis
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-KisDb2026!}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kis -d kisdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI backend (Pioneer SLM + RAG) ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kis-backend
    ports:
      - "8000:8000"
    environment:
      # Toggle between ChromaDB (dev) and OpenSearch (prod)
      - VECTOR_STORE=${VECTOR_STORE:-opensearch}
      - OPENSEARCH_URL=https://opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-Medion!KIS2026}
      - OPENSEARCH_INDEX=${OPENSEARCH_INDEX:-viaticum-transcripts}
      # Pioneer SLM (set in .env)
      - PIONEER_SOAP_MODEL_ID=${PIONEER_SOAP_MODEL_ID:-}
      - PIONEER_NER_MODEL_ID=${PIONEER_NER_MODEL_ID:-}
      - PIONNEER_CHAT_MODEL_ID=${PIONNEER_CHAT_MODEL_ID:-}
      - GCP_AI_STUDIO_API_KEY=${GCP_AI_STUDIO_API_KEY:-}
      - PIONEER_API_KEY=${PIONEER_API_KEY:-}
      - PIONEER_BASE_URL=${PIONEER_BASE_URL:-https://api.pioneer.ai/v1}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - STT_PROVIDER=${STT_PROVIDER:-stub}
      # Gradium STT (primary) + Parakeet Cloud Run (fallback)
      - GRADIUM_API_KEY=${GRADIUM_API_KEY:-}
      - PARAKEET_URL=${PARAKEET_URL:-}
      # Firestore — set GCP_PROJECT_ID to enable; ADC from mounted credentials
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
      # PostgreSQL
      - POSTGRES_DSN=postgresql://kis:${POSTGRES_PASSWORD:-KisDb2026!}@postgres:5432/kisdb
      # LLM for chat
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./backend/logs:/app/backend/logs
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Medion KIS static frontend (nginx) ──────────────────────────────────
  frontend_react:
    build:
      context: .
      dockerfile: Dockerfile.frontend_react
    container_name: kis-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  opensearch-data:
  postgres-data:

networks:
  default:
    name: kis-net
